services:

  airflow-db:
    image: postgres:16-alpine
    container_name: airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_secret
    volumes:
      - airflow_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 para não conflitar com o PostgreSQL do MLflow (5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.10.0
    container_name: airflow_init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ..:/opt/airflow/project          # projeto completo disponível para os scripts
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Permite que o scheduler acesse o MLflow e MinIO do host
      MLFLOW_TRACKING_URI: "http://host.docker.internal:5000"
      MLFLOW_S3_ENDPOINT_URL: "http://host.docker.internal:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin_secret"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ..:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: scheduler

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8081:8080"   # http://localhost:8081 (8080 já usado pelo Kind)
    command: webserver

volumes:
  airflow_db:
  airflow_logs:
